version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: urbancool-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: urbancool-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: urbancool-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/urbancool
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=supersecretjwtkey123
      - ANALYTICS_URL=http://analytics:8000
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  analytics:
    build:
      context: ./analytics
    container_name: urbancool-analytics
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MONGO_URI=mongodb://mongodb:27017/urbancool
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: urbancool-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
