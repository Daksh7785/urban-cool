version: '3.8'

services:
  # Phase 16: CIOS DevOps Orchestration
  cios-frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - cios-backend

  cios-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://cios-mongo:27017/cios
      - REDIS_URL=redis://cios-redis:6379
      - QDRANT_URL=http://cios-qdrant:6333
    depends_on:
      - cios-mongo
      - cios-redis

  cios-ml-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.ml
    environment:
      - REDIS_URL=redis://cios-redis:6379
    depends_on:
      - cios-redis

  cios-mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - cios_mongo_data:/data/db

  cios-redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  cios-qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"

volumes:
  cios_mongo_data:
