name: UrbanCool AI CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-allowed: true
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Geospatial Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-dev gdal-bin libgdal-dev proj-bin libproj-dev

    - name: Upgrade Pip & Install Python Requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Environment Verification
      run: |
        python verify_setup.py

    - name: Run E2E Integration Suite
      run: |
        python -m pytest tests/test_physics_model.py
        python tests/test_end_to_end.py
